name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile 2>/dev/null || bun install

      - name: 🏗️ Build Next.js static export
        run: |
          echo "Building Next.js static export..."
          bun run build 2>&1
          echo "Checking output..."
          ls -la out/ | head -15
          echo "Checking game page..."
          ls -la out/assets/ | head -10

      - name: 📋 Prepare Capacitor webDir
        run: |
          echo "Preparing Capacitor webDir from static export..."
          # The 'out' directory contains the full static export
          # Copy it as the Capacitor webDir
          rm -rf www 2>/dev/null || true
          cp -r out www
          # Verify the game page exists
          echo "Checking www contents:"
          ls -la www/ | head -15
          echo "Checking assets:"
          ls -la www/assets/ | head -10
          echo "Checking HTML:"
          head -5 www/index.html

      - name: ⚙️ Configure Capacitor
        run: |
          cat > capacitor.config.ts << 'CAPEOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.throneofrealms.game',
            appName: 'Throne of Realms',
            webDir: 'www',
            android: {
              allowMixedContent: true,
            },
            server: {
              androidScheme: 'https',
            },
          };

          export default config;
          CAPEOF
          echo "Capacitor config updated"

      - name: 📱 Add Android platform
        run: |
          npx cap add android 2>&1 || echo "Android platform may already exist"
          echo "Checking android directory..."
          ls -la android/ 2>/dev/null | head -5

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: throne-of-realms-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🏷️ Create Release with APK (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
