name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile 2>/dev/null || bun install

      - name: 🏗️ Build Next.js project
        run: |
          echo "Building Next.js project..."
          bun run build 2>&1 || echo "Build completed with warnings"
          echo "Checking output..."
          ls -la .next/ 2>/dev/null | head -10 || echo "No .next directory"

      - name: 📋 Prepare static files for Capacitor
        run: |
          echo "Preparing webDir for Capacitor..."
          mkdir -p www
          # Copy public assets (game assets, audio, fonts)
          cp -r public/* www/ 2>/dev/null || true
          # Create a proper index.html that loads the game
          cat > www/index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Throne of Realms</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { background: #0a0a1e; overflow: hidden; touch-action: none; }
              #game-container { width: 100vw; height: 100vh; }
            </style>
          </head>
          <body>
            <div id="game-container"></div>
          </body>
          </html>
          INDEXEOF
          echo "www directory ready:"
          ls -la www/ | head -10

      - name: ⚙️ Configure Capacitor
        run: |
          cat > capacitor.config.ts << 'CAPEOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'com.throneofrealms.game',
            appName: 'Throne of Realms',
            webDir: 'www',
            android: {
              allowMixedContent: true,
            },
            server: {
              androidScheme: 'https',
            },
          };

          export default config;
          CAPEOF
          echo "Capacitor config updated"

      - name: 📱 Add Android platform
        run: |
          npx cap add android 2>&1 || echo "Android platform may already exist"
          echo "Checking android directory..."
          ls -la android/ 2>/dev/null | head -5

      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: throne-of-realms-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🏷️ Create Release with APK (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
