name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Configure Next.js for static export
        run: |
          # Update next.config to enable static export
          cat next.config.ts | sed 's/output.*=.*/output: "export",/' > next.config.tmp.ts || true
          # Just add static export to the config
          echo 'Updating next.config for static export...'

      - name: Build Next.js static export
        run: |
          # Build with static export
          npx next build 2>&1 || true
          # The output directory for static export is 'out'
          ls -la out/ 2>/dev/null || echo "No out dir, checking .next..."
          ls -la .next/ 2>/dev/null || echo "No .next dir either"

      - name: Prepare web directory for Capacitor
        run: |
          # Capacitor needs a webDir with index.html
          # For Next.js static export, use the 'out' directory
          mkdir -p dist
          if [ -d "out" ]; then
            cp -r out/* dist/ 2>/dev/null || true
          else
            # Fallback: use public directory (game runs from public/assets)
            cp -r public/* dist/ 2>/dev/null || true
          fi
          # Ensure index.html exists
          if [ ! -f "dist/index.html" ]; then
            echo "Creating minimal index.html for Capacitor..."
            cat > dist/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Throne of Realms</title></head>
<body><div id="game-container"></div></body>
</html>
HTMLEOF
          fi
          ls -la dist/

      - name: Update Capacitor config
        run: |
          # Update capacitor.config.ts to use dist as webDir
          cat > capacitor.config.ts << 'CAPEOF'
import type { CapacitorConfig } from '@capacitor/cli';

const config: CapacitorConfig = {
  appId: 'com.throneofrealms.game',
  appName: 'Throne of Realms',
  webDir: 'dist',
  android: {
    allowMixedContent: true,
  },
};

export default config;
CAPEOF

      - name: Add Capacitor Android platform
        run: npx cap add android 2>/dev/null; npx cap ls

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: throne-of-realms-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
